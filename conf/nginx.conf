worker_processes 10;
events {
    worker_connections 1024;
}
http {
    access_log logs/access.log;
    error_log logs/error.log debug;
    
    # 百炼 Coding Plan - qwen3.5-plus
    server {
        listen 443 ssl;
        server_name api.openai.com;

        ssl_certificate     ../cert/api.openai.com.crt;
        ssl_certificate_key  ../cert/api.openai.com.key;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        location = /v1/models {
            default_type application/json;
            return 200 '{"object":"list","data":[{"id":"qwen3.5-plus","object":"model","owned_by":"alibaba"},{"id":"qwen3-max-2026-01-23","object":"model","owned_by":"alibaba"},{"id":"qwen3-coder-next","object":"model","owned_by":"alibaba"},{"id":"qwen3-coder-plus","object":"model","owned_by":"alibaba"},{"id":"MiniMax-M2.5","object":"model","owned_by":"minimax"},{"id":"glm-5","object":"model","owned_by":"zhipu"},{"id":"glm-4.7","object":"model","owned_by":"zhipu"},{"id":"kimi-k2.5","object":"model","owned_by":"moonshot"}]}';
        }

        location / {
            proxy_pass https://coding.dashscope.aliyuncs.com;
            proxy_http_version 1.1;
            proxy_set_header Host coding.dashscope.aliyuncs.com;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Content-Type $http_content_type;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
            proxy_ssl_verify off;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_set_header Connection '';
            chunked_transfer_encoding off;
        }

        location = /favicon.ico {
            return 204;
        }
    }
}
